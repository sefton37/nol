# LoRA configuration for Phase 9a: Intent → I/O Assembly
# Extends Phase 7a training to cover I/O operations (file, string, process).
# Includes the expanded corpus from RIVA session ingestion.

model:
  base: "meta-llama/Llama-3.1-8B-Instruct"
  fallback: "codellama/CodeLlama-7b-Instruct-hf"
  max_length: 2048

# Continue from Phase 8 adapter (latest feedback-trained model)
base_adapter_path: "models/7a_intent_to_asm/final"

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  num_epochs: 2          # Two passes: new I/O patterns need more exposure
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-4  # Between Phase 7 (2e-4) and Phase 8 (5e-5)
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.08
  weight_decay: 0.01
  max_grad_norm: 1.0
  eval_steps: 50
  save_steps: 50
  logging_steps: 10
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  fp16: false
  bf16: true
  dataloader_num_workers: 4

# Data: merge existing corpus with RIVA session pairs and I/O catalog
data:
  train_sources:
    - "data/splits/train.jsonl"       # Existing Phase 7 training data
    - "data/riva_pairs.nolt"          # RIVA session ingestion output
  val_source: "data/splits/val.jsonl"
  test_source: "data/splits/test.jsonl"

inference:
  temperature: 0.1  # Lower than Phase 7 for I/O (more deterministic)
  top_p: 0.95
  max_new_tokens: 1024
  do_sample: false

output_dir: "models/9a_intent_to_io_asm"
